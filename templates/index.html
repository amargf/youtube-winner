<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار فائز عشوائي - يوتيوب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        
        .container:hover {
            transform: translateY(-5px);
        }
        
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 25px;
            font-size: 16px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: #f0f0f0;
            padding: 5px;
            border-radius: 15px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: transparent;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 15px;
            color: #666;
        }
        
        .tab-btn.active {
            background: white;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }
        
        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.5);
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #555;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #333;
            font-family: inherit;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            color: #333;
            font-family: inherit;
            resize: vertical;
            min-height: 150px;
            line-height: 1.8;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .hint {
            color: #888;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 5px;
        }
        
        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .btn-success:hover:not(:disabled) {
            background: #218838;
            transform: translateY(-2px);
        }
        
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        
        .btn-warning:hover:not(:disabled) {
            background: #e0a800;
            transform: translateY(-2px);
        }
        
        .names-counter {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }
        
        .names-counter span {
            font-weight: bold;
            color: #667eea;
        }
        
        .result-container {
            margin-top: 30px;
            padding: 25px 20px;
            background: #f8f9fa;
            border-radius: 12px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #e0e0e0;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        
        .result-container.has-winner {
            border-color: #667eea;
            background: linear-gradient(135deg, #f8f9fa 0%, #eef1ff 100%);
            border-style: solid;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.2);
        }
        
        .result-container.spinning {
            border-color: #ffc107;
            background: linear-gradient(135deg, #fff8e1 0%, #ffecb3 100%);
            border-style: solid;
        }
        
        .result-label {
            color: #888;
            font-size: 16px;
            margin-bottom: 12px;
            font-weight: bold;
        }
        
        .winner-wrapper {
            width: 100%;
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            margin-bottom: 10px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .winner-name {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            text-align: center;
            word-wrap: break-word;
            max-width: 100%;
            line-height: 1.4;
            transition: all 0.05s ease;
        }
        
        .winner-name.spinning {
            color: #ffc107;
            animation: spinText 0.05s infinite;
        }
        
        .winner-name.highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 38px;
            text-shadow: 0 2px 20px rgba(102, 126, 234, 0.3);
            animation: fadeInUp 0.6s ease, pulse 2s ease-in-out infinite;
        }
        
        .winner-name.highlight::before {
            content: "🏆 ";
            -webkit-text-fill-color: initial;
            color: #fbbf24;
        }
        
        .winner-name.highlight::after {
            content: " 🏆";
            -webkit-text-fill-color: initial;
            color: #fbbf24;
        }
        
        @keyframes spinText {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .winner-source {
            margin-top: 8px;
            font-size: 13px;
            color: #999;
        }
        
        .winner-comment {
            margin-top: 10px;
            padding: 10px 15px;
            background: #f0f0f0;
            border-radius: 8px;
            color: #555;
            font-size: 15px;
            border-right: 4px solid #667eea;
            text-align: right;
            font-style: italic;
            width: 100%;
        }
        
        .winner-comment-label {
            font-size: 12px;
            color: #999;
            display: block;
            margin-bottom: 4px;
        }
        
        .comment-count {
            margin-top: 8px;
            color: #666;
            font-size: 15px;
            font-weight: 500;
            background: rgba(102, 126, 234, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            display: none;
        }
        
        .comment-count.show {
            display: inline-block;
        }
        
        .winner-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 5px;
        }
        
        .winner-emoji.spinning {
            animation: bounce 0.1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        .error-message {
            color: #dc3545;
            text-align: center;
            padding: 10px;
            background: #fde8e8;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        
        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }
        
        .loader {
            display: none;
            width: 40px;
            height: 40px;
            margin: 10px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loader.show {
            display: block;
        }
        
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }
        
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear forwards;
        }
        
        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .example-names {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }
        
        .example-tag {
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .example-tag:hover {
            background: #667eea;
            color: white;
        }
        
        /* مؤشر التحميل النصي */
        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .winner-name {
                font-size: 24px;
            }
            
            .winner-name.highlight {
                font-size: 28px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button {
                padding: 12px 20px;
                font-size: 15px;
            }
            
            .winner-emoji {
                font-size: 36px;
            }
            
            .winner-wrapper {
                padding: 12px;
            }
            
            .tabs {
                flex-direction: column;
            }
        }
        
        @media (max-width: 400px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .winner-name.highlight {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 اختيار فائز عشوائي</h1>
        <p class="subtitle">من تعليقات يوتيوب أو أسماء مكتوبة يدوياً</p>
        
        <!-- تبويبات -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="youtube">📺 يوتيوب</button>
            <button class="tab-btn" data-tab="manual">✏️ كتابة يدوية</button>
        </div>
        
        <!-- تبويب يوتيوب -->
        <div class="tab-content active" id="tab-youtube">
            <div class="input-group">
                <label for="videoUrl">رابط فيديو يوتيوب</label>
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="أدخل رابط الفيديو هنا..."
                    dir="ltr"
                >
            </div>
            
            <div class="button-group">
                <button class="btn-primary" id="pickBtn">🎲 اختر الفائز</button>
                <button class="btn-secondary" id="resetBtn">🔄 إعادة تعيين</button>
            </div>
        </div>
        
        <!-- تبويب كتابة يدوية -->
        <div class="tab-content" id="tab-manual">
            <div class="input-group">
                <label for="namesInput">📝 أدخل الأسماء (اسم واحد في كل سطر)</label>
                <textarea 
                    id="namesInput" 
                    placeholder="أحمد&#10;محمد&#10;سارة&#10;فاطمة&#10;علي"
                ></textarea>
                <div class="hint">
                    💡 أدخل اسماً واحداً في كل سطر
                    <span class="names-counter" id="namesCounter">عدد الأسماء: <span id="nameCount">0</span></span>
                </div>
                <div class="example-names">
                    <span class="example-tag" onclick="addExample('أحمد')">أحمد</span>
                    <span class="example-tag" onclick="addExample('محمد')">محمد</span>
                    <span class="example-tag" onclick="addExample('سارة')">سارة</span>
                    <span class="example-tag" onclick="addExample('فاطمة')">فاطمة</span>
                    <span class="example-tag" onclick="addExample('علي')">علي</span>
                    <span class="example-tag" onclick="addExample('نور')">نور</span>
                    <span class="example-tag" onclick="addExample('ليلى')">ليلى</span>
                </div>
            </div>
            
            <div class="button-group">
                <button class="btn-success" id="pickManualBtn">🎲 اختر من الأسماء</button>
                <button class="btn-warning" id="clearNamesBtn">🗑️ مسح الكل</button>
            </div>
        </div>
        
        <div class="loader" id="loader"></div>
        
        <div class="result-container" id="resultContainer">
            <span class="result-label">🏆 الفائز هو</span>
            <div class="winner-wrapper" id="winnerWrapper">
                <span class="winner-emoji" id="winnerEmoji">🎉</span>
                <div class="winner-name" id="winnerName">...</div>
                <div class="winner-source" id="winnerSource"></div>
                <div class="winner-comment" id="winnerComment" style="display:none;">
                    <span class="winner-comment-label">📝 التعليق:</span>
                    <span id="commentText"></span>
                </div>
            </div>
            <div class="comment-count" id="commentCount"></div>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
    </div>
    
    <div class="confetti-container" id="confettiContainer"></div>
    
    <script>
        // عناصر التبويبات
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        
        // عناصر يوتيوب
        const videoUrlInput = document.getElementById('videoUrl');
        const pickBtn = document.getElementById('pickBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // عناصر الكتابة اليدوية
        const namesInput = document.getElementById('namesInput');
        const pickManualBtn = document.getElementById('pickManualBtn');
        const clearNamesBtn = document.getElementById('clearNamesBtn');
        const nameCount = document.getElementById('nameCount');
        
        // عناصر النتيجة
        const winnerName = document.getElementById('winnerName');
        const winnerEmoji = document.getElementById('winnerEmoji');
        const winnerSource = document.getElementById('winnerSource');
        const winnerComment = document.getElementById('winnerComment');
        const commentText = document.getElementById('commentText');
        const commentCount = document.getElementById('commentCount');
        const resultContainer = document.getElementById('resultContainer');
        const errorMessage = document.getElementById('errorMessage');
        const loader = document.getElementById('loader');
        const confettiContainer = document.getElementById('confettiContainer');
        
        // متغيرات التحكم في تأثير التمرير
        let spinInterval = null;
        let isSpinning = false;
        
        // التبديل بين التبويبات
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                tabContents.forEach(c => c.classList.remove('active'));
                const tabId = btn.dataset.tab;
                document.getElementById(`tab-${tabId}`).classList.add('active');
                resetResult();
                hideError();
                stopSpin();
            });
        });
        
        // تحديث عدد الأسماء
        namesInput.addEventListener('input', () => {
            const names = getNamesFromInput();
            nameCount.textContent = names.length;
        });
        
        // دالة جلب الأسماء من المدخل
        function getNamesFromInput() {
            return namesInput.value
                .split('\n')
                .map(name => name.trim())
                .filter(name => name.length > 0);
        }
        
        // إضافة اسم مثال
        function addExample(name) {
            const current = namesInput.value.trim();
            if (current) {
                namesInput.value = current + '\n' + name;
            } else {
                namesInput.value = name;
            }
            nameCount.textContent = getNamesFromInput().length;
        }
        
        // دالة تأثير التمرير السريع للأسماء
        function startSpin(names, callback) {
            if (isSpinning) return;
            isSpinning = true;
            
            // إظهار تأثير التمرير
            winnerName.className = 'winner-name spinning';
            winnerEmoji.className = 'winner-emoji spinning';
            resultContainer.classList.add('spinning');
            winnerSource.textContent = '🔄 جاري الاختيار...';
            winnerComment.style.display = 'none';
            commentCount.textContent = '';
            commentCount.classList.remove('show');
            
            let index = 0;
            const spinDuration = 3000; // 3 ثواني
            const startTime = Date.now();
            
            // تغيير الاسم بسرعة
            spinInterval = setInterval(() => {
                // اختيار اسم عشوائي
                const randomIndex = Math.floor(Math.random() * names.length);
                winnerName.textContent = names[randomIndex];
                
                // تغيير الإيموجي بشكل عشوائي
                const emojis = ['🎲', '🎯', '⭐', '✨', '🔥', '💫', '🌟'];
                winnerEmoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                index++;
            }, 50); // تغيير كل 50 مللي ثانية
            
            // إيقاف التمرير بعد المدة المحددة
            setTimeout(() => {
                stopSpin();
                
                // اختيار الفائز النهائي
                const winner = names[Math.floor(Math.random() * names.length)];
                winnerName.textContent = winner;
                winnerName.className = 'winner-name highlight';
                winnerEmoji.textContent = '🎉';
                winnerEmoji.className = 'winner-emoji';
                resultContainer.classList.remove('spinning');
                resultContainer.classList.add('has-winner');
                winnerSource.textContent = `📋 من بين ${names.length} اسم`;
                
                // استدعاء callback إذا وجد
                if (callback) callback(winner);
                
                // إظهار الكنفيتي
                showConfetti();
                
                isSpinning = false;
            }, spinDuration);
        }
        
        // إيقاف التمرير
        function stopSpin() {
            if (spinInterval) {
                clearInterval(spinInterval);
                spinInterval = null;
            }
            isSpinning = false;
            winnerName.className = 'winner-name';
            winnerEmoji.className = 'winner-emoji';
            resultContainer.classList.remove('spinning');
        }
        
        // اختيار فائز من الأسماء المكتوبة يدوياً
        pickManualBtn.addEventListener('click', () => {
            const names = getNamesFromInput();
            
            if (names.length === 0) {
                showError('الرجاء إدخال اسم واحد على الأقل');
                return;
            }
            
            if (isSpinning) return;
            
            // إعادة تعيين النتيجة السابقة
            resetResult();
            hideError();
            
            // بدء تأثير التمرير
            startSpin(names);
        });
        
        // مسح جميع الأسماء
        clearNamesBtn.addEventListener('click', () => {
            namesInput.value = '';
            nameCount.textContent = '0';
            resetResult();
            stopSpin();
        });
        
        // اختيار فائز من يوتيوب مع تأثير التمرير
        pickBtn.addEventListener('click', async () => {
            const videoUrl = videoUrlInput.value.trim();
            
            if (!videoUrl) {
                showError('الرجاء إدخال رابط الفيديو');
                return;
            }
            
            if (isSpinning) return;
            
            pickBtn.disabled = true;
            loader.classList.add('show');
            hideError();
            resetResult();
            stopSpin();
            
            try {
                const response = await fetch('/api/pick-winner', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ video_url: videoUrl })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'حدث خطأ');
                }
                
                // عرض اسم الفائز مع تأثير التمرير
                // نضع الأسماء في مصفوفة مؤقتة للتأثير
                const tempNames = [data.winner, ...getRandomNames(5)];
                startSpin(tempNames, (finalWinner) => {
                    // بعد انتهاء التمرير، نعرض البيانات الحقيقية
                    winnerName.textContent = data.winner;
                    winnerName.className = 'winner-name highlight';
                    winnerEmoji.textContent = '🎉';
                    winnerEmoji.className = 'winner-emoji';
                    winnerSource.textContent = `📺 من تعليقات يوتيوب`;
                    
                    if (data.winner_comment && data.winner_comment.trim() !== '') {
                        commentText.textContent = data.winner_comment;
                        winnerComment.style.display = 'block';
                    } else {
                        winnerComment.style.display = 'none';
                    }
                    
                    if (data.has_comments && data.total_comments > 0) {
                        commentCount.textContent = `من بين ${data.total_comments} تعليق`;
                        commentCount.classList.add('show');
                    } else {
                        commentCount.textContent = '';
                        commentCount.classList.remove('show');
                    }
                });
                
            } catch (error) {
                showError(error.message);
                winnerName.textContent = '❌';
                winnerName.className = 'winner-name';
                winnerEmoji.textContent = '😅';
                winnerEmoji.className = 'winner-emoji';
                winnerSource.textContent = '';
                winnerComment.style.display = 'none';
                commentCount.textContent = '';
                commentCount.classList.remove('show');
                resultContainer.classList.remove('has-winner');
            } finally {
                pickBtn.disabled = false;
                loader.classList.remove('show');
            }
        });
        
        // دالة للحصول على أسماء عشوائية للتأثير
        function getRandomNames(count) {
            const names = ['⭐⭐⭐', '✨✨✨', '🌟🌟🌟', '💫💫💫', '🔥🔥🔥'];
            const result = [];
            for (let i = 0; i < count; i++) {
                result.push(names[Math.floor(Math.random() * names.length)]);
            }
            return result;
        }
        
        // إعادة تعيين
        resetBtn.addEventListener('click', () => {
            videoUrlInput.value = '';
            resetResult();
            hideError();
            stopSpin();
            videoUrlInput.focus();
            confettiContainer.innerHTML = '';
        });
        
        // دالة إعادة تعيين النتيجة
        function resetResult() {
            stopSpin();
            winnerName.textContent = '...';
            winnerName.className = 'winner-name';
            winnerEmoji.textContent = '🎉';
            winnerEmoji.className = 'winner-emoji';
            winnerSource.textContent = '';
            winnerComment.style.display = 'none';
            commentCount.textContent = '';
            commentCount.classList.remove('show');
            resultContainer.classList.remove('has-winner');
            resultContainer.classList.remove('spinning');
            confettiContainer.innerHTML = '';
        }
        
        // دالة عرض الخطأ
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }
        
        // دالة إخفاء الخطأ
        function hideError() {
            errorMessage.classList.remove('show');
        }
        
        // دالة إظهار الكنفيتي
        function showConfetti() {
            confettiContainer.innerHTML = '';
            const colors = ['#667eea', '#764ba2', '#fbbf24', '#34d399', '#f472b6', '#60a5fa', '#fb923c'];
            const shapes = ['●', '■', '▲', '★', '♦', '♥', '✦'];
            
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.fontSize = (Math.random() * 16 + 10) + 'px';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = (Math.random() * 1.5) + 's';
                confettiContainer.appendChild(confetti);
            }
            
            setTimeout(() => {
                confettiContainer.innerHTML = '';
            }, 5000);
        }
        
        // الضغط على Enter في حقل الرابط
        videoUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                pickBtn.click();
            }
        });
        
        // تحميل تلقائي للرابط من الحافظة
        if (navigator.clipboard) {
            document.addEventListener('paste', async (e) => {
                const text = await navigator.clipboard.readText();
                if (text.includes('youtube.com') || text.includes('youtu.be')) {
                    videoUrlInput.value = text;
                }
            });
        }
    </script>
</body>
</html>
